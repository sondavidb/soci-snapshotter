name: Push release tag

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'New SOCI release tag (e.g. v0.1.2)'
        required: true
        type: string

env:
  GO_VERSION: '1.25.11'

jobs:
  # Ensure all the correct artifacts are in the rleease branch
  check-release-branch-state:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04

    env:
      TARGET_BRANCH: '' # Filled in first steps

    steps:
      - name: Check provided tag is sensical
        run: |
          echo "${{ inputs.tag_name }}" | grep -qP '^v[0-9]+\.[0-9]+\.[0-9]+$'
          echo "Got tag ${{ inputs.tag_name }} from input"

          # Make sure tag doesn't already exist upstream, this will fail is do
          curl -s https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/releases | grep "tag_name" | cut -d '"' -f 4 | grep -q ${{ inputs.tag_name }}


      - name: Export release branch
        run: |
          echo "TARGET_BRANCH=release/$(echo ${{ inputs.tag_name }} | grep -Eo '[0-9]+\.[0-9]+')" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Generate third party licenses file
        run: bash scripts/build-third-party-licenses.sh

      - name: Check diff is empty
        run: git diff --exit-code

      - name: Increment version in docs
        run: bash scripts/update-version-in-docs.sh ${{ inputs.tag_name }}

      - name: Check diff is empty
        run: git diff --exit-code
    
    outputs:
      release-branch: ${{ env.TARGET_BRANCH }}

  create-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    needs: check-release-branch-state
    steps:
      - name: Bump version and push tag
        uses: laputansoft/github-tag-action@v4
        with:
          github_token: ${{ env.github-token }}
          tag: ${{ inputs.tag_name }}
          release_branches: ${{ needs.check-release-branch-state.outputs.release-branch }}
