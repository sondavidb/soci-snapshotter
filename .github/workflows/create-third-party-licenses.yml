name: "Create THIRD_PARTY_LICENSES file"

on:
  create:
    branches: ['release/**']
  pull_request:
    branches: ['main', 'release/**']
    paths:
      - '.github/workflows/create-release-branch.yml'
      - 'scripts/build-third-party-licenses.sh'
  # Run workflow on all pushes to a release branch
  push:
    branches: ['release/**']

env:
  GO_VERSION: '1.25.10'

permissions:
  contents: write
  pull-requests: write

jobs:
  test-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts/build-third-party-licenses.sh
          ref: ${{ github.ref_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Generate third party licenses file
        run: bash scripts/build-third-party-licenses.sh

  initial-pr:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    env:
      MAJOR_MINOR: '' # Set in steps
      VERSION: '' # Set in steps

    permissions:
      # Write permissions needed to create pull request.
      # Risk for pwn requests is mitigated by seperating jobs such that
      # workflows running with write permissions only use code from the
      # branch which was cut from main.
      contents: write
      pull-requests: write

    steps:
      - name: Set env vars for create
        run: |
          branch_name=${{ github.ref_name }}
          major_minor=${branch_name#*/}
          echo "MAJOR_MINOR=${major_minor}" >> $GITHUB_ENV
          echo "VERSION=v${major_minor}.0" >> $GITHUB_ENV

      - name: Set env vars for push
        run: |
          # curl GitHub API to get latest tag based on the branch that was pushed to
          latest_tag=$(curl -s https://api.github.com/repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/releases | grep "tag_name" | cut -d '"' -f 4 | grep ${{ github.ref_name }} | head -n 1)

          # Fallback if tag isn't found, assume major.minor.0
          branch_name=${{ github.ref_name }}
          major_minor=${branch_name#*/}
          if [ -z "$STRING" ]; then latest_tag="v${major_minor}.0"; fi

          # Increment patch ver
          echo "TAG_NAME=$(echo ${latest_tag} | awk -F. -v OFS=. '{$NF += 1 ; print}')" >> $GITHUB_ENV
          echo "TARGET_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV


      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}


      - name: Install go-licenses
        run: go install github.com/google/go-licenses/v2@v2.0.1

      - name: Generate third party licenses file
        run: bash scripts/build-third-party-licenses.sh

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'Add third party licenses for ${{ env.VERSION }}'
          commit-message: |
            Add third party licenses for ${{ env.VERSION }}.
          body: |
            This change adds the THIRD_PARTY_LICENSES file for ${{ env.VERSION }}.

            This PR must be closed and reopened manually to trigger automated checks.

            Auto-generated by [create-pull-request](https://github.com/peter-evans/create-pull-request)
          labels: easy-to-review, automated-pr
          token: ${{ secrets.GITHUB_TOKEN }}
          author: "GitHub <no-reply@github.com>"
          signoff: true
          branch: 'create-pull-request/third-party-licenses-${{ env.VERSION }}'
          base: '${{ github.ref_name }}'
          delete-branch: true
